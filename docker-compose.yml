services:
  nest-bff:
    build: .
    image: nest-bff
    env_file:
      - .env.production
    ports:
      - "3001:3001"
    restart: always
    networks:
      - nest-bff

  postgres:
    container_name: postgres
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nest-bff

  redis:
    container_name: redis
    image: redis:7
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data/redis
    networks:
      - nest-bff

  migrate:
    image: nest-bff
    env_file:
      - .env.production
    command: npx prisma migrate deploy
    depends_on:
      - postgres
    networks:
      - nest-bff

volumes:
  postgres_data:
  redis_data:

networks:
  nest-bff:
    external: true
